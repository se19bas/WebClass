<html>
    <head>
        <title>Exercício HTML – parte 2</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css\FirstCss.css"/>
        
        <style>
            .for{
                background-color: lightgray;
                border: solid black 2px;
            }
        </style>
    </head>
    <body>
        <header>Formulário</header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="">Formulário</a></li>
                <li><a href="ListTable.html">Lista e Tabela</a></li>
            </ul>
        </nav>
        <form class="for">
        
            <div>
                <label for="dat">Dta Nascimento</label>
                <input type="date" id="dat" name="data"><br>

                <label for="idade">Idade</label>
                <input type="number" id="idade" name="idade"><br>

                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome"><br>

                <input type="text" id="cpf" name="cpf" placeholder="Cpf" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"><br>
                <input type="text" id="endereco" name="rua" placeholder="Endereco"><br>
                <input type="text" id="telefone" name="celular" placeholder="Telefone" maxlength="15" pattern="\{\d{2}\s\d[5]\{}}"><br>

            </div>
            <div>
                <input style="background-color: green; color: white;" type="submit" value="enviar">
                <input style="background-color: green; color: white;" type="reset" value="limpa">
            </div>
        </form>
    </body>
</html>
